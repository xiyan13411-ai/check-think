 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 420" fill="none">
   <!-- Drop shadow -->
   <rect x="15" y="15" width="170" height="390" rx="35" fill="rgba(0,0,0,0.03)" stroke="rgba(0,0,0,0.04)" stroke-width="2" transform="translate(0,4)" />
   <!-- Phone body -->
   <defs>
     <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
       <stop offset="0%" stop-color="#fef3f2" />
       <stop offset="40%" stop-color="#fce7f3" />
       <stop offset="100%" stop-color="#ffedd5" />
     </linearGradient>
     <radialGradient id="lens" cx="50%" cy="50%" r="50%">
       <stop offset="0%" stop-color="#292524" />
       <stop offset="80%" stop-color="#1c1917" />
       <stop offset="100%" stop-color="#44403c" />
     </radialGradient>
   </defs>
   <rect x="15" y="15" width="170" height="390" rx="35" fill="url(#bg)" stroke="#e7e5e4" stroke-width="1.5" />
   <!-- Camera module -->
   <rect x="30" y="40" width="65" height="80" rx="12" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="0.8" />
   <circle cx="45" cy="55" r="12" fill="url(#lens)" />
   <circle cx="45" cy="55" r="10" fill="#292524" />
   <circle cx="42" cy="52" r="3" fill="rgba(255,255,255,0.08)" />
   <circle cx="75" cy="55" r="9" fill="url(#lens)" />
   <circle cx="75" cy="55" r="7" fill="#292524" />
   <circle cx="73" cy="53" r="2" fill="rgba(255,255,255,0.08)" />
   <circle cx="60" cy="70" r="6" fill="url(#lens)" />
   <circle cx="60" cy="70" r="4.5" fill="#292524" />
   <rect x="30" y="105" width="8" height="8" rx="2" fill="#e7e5e4" />
   <!-- Edge highlight -->
   <path d="M20,18 Q100,15 180,18" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none" />
   <!-- Metal frame border -->
   <rect x="15" y="15" width="170" height="390" rx="35" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
 </svg>
